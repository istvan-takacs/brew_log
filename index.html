<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Brew Log</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Brew Log ☕📊 </h1>
        
        <!-- Location Tabs -->
        <nav class="location-tabs">
            <button class="location-tab" data-location="all" data-short="All">All Locations</button>
            <button class="location-tab active" data-location="Shoreditch" data-short="LSD">Shoreditch</button>
            <button class="location-tab" data-location="Tower" data-short="LTL">Tower</button>
            <button class="location-tab" data-location="Bankside" data-short="LBS">Bankside</button>
            <button class="location-tab" data-location="Victoria" data-short="LVS">Victoria</button>
            <button class="location-tab" data-location="Olympia" data-short="LOL">Olympia</button>
        </nav>
    </header>
    
    <div class="contents">
        <div class="log">
            <div class="log-header">
                <h2>Log Brew</h2>
                <button type="button" id="toggle-form" class="toggle-form-btn" aria-label="Toggle form">
                    <span class="toggle-icon">−</span>
                </button>
            </div>
            
            <div id="form-content" class="form-content">
            <!-- Bean Type Selector -->
            <div class="bean-selector">
                <button type="button" class="bean-btn active" data-bean="House">House</button>
                <button type="button" class="bean-btn" data-bean="Decaf">Decaf</button>
            </div>
            
            <form id="brew-log" action="" method="get">
                <div class="weight">
                    <label for="weight">Weight (g)</label>
                    <input type="text" inputmode="decimal" id="weight" name="weight" pattern="[0-9]+([\.\,][0-9]+)?" step="0.1" min="18.5" max="19.5" lang="en" placeholder="19" required autofocus>
                    <span class="input-hint hidden" id="weight-hint">Must be between 18.5-19.5g</span>
                </div>
                <div class="time">
                    <label for="time">Time (s)</label>
                    <input type="text" inputmode="decimal" id="time" name="time" pattern="[0-9]+([\.\,][0-9]+)?" step="1" min="24" max="30" lang="en" placeholder="27" required>
                    <span class="input-hint hidden" id="time-hint">Must be between 26-30s</span>
                </div>
                <div class="grind">
                    <label for="grind">Grinder time (s)</label>
                    <input type="text" inputmode="decimal" id="grind" name="grind" pattern="[0-9]+([\.\,][0-9]+)?" step="0.05" min="3" max="15" lang="en" placeholder="6" required>
                    <span class="input-hint hidden" id="grind-hint">Must be between 3-15s</span>
                </div>
                <div class="log-btn">
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Log Brew</span>
                        <span class="btn-spinner hidden">⏳</span>
                    </button>
                </div>
            </form>
            </div><!-- /form-content -->
        </div>
        <div class="history">
            <h2>Brew History</h2>
            
            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="today">Today</button>
                <button class="filter-tab" data-filter="week">This Week</button>
                <button class="filter-tab" data-filter="all">All Time</button>
            </div>
            
            <!-- Stats Summary -->
            <div class="stats-summary" id="stats-summary">
                <div class="stat-item">
                    <span class="stat-label">Total Brews</span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Showing</span>
                    <span class="stat-value" id="stat-showing">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Current Streak</span>
                    <span class="stat-value" id="stat-streak">🔥 0</span>
                </div>
            </div>
            
            <div class="table-container">
                <!-- Loading Skeleton -->
                <div id="loading-skeleton" class="loading-skeleton hidden">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
                
                <table id="brew-table">
                    <thead>
                        <tr id="table-header-row">
                            <th>Timestamp</th>
                            <th>Shift</th>
                            <th>Bean</th>
                            <th>Weight (g)</th>
                            <th>Time (s)</th>
                            <th>Grind (s)</th>
                        </tr>
                    </thead>
                    <tbody id="brew-table-body">
                        <!-- Brews will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Brew logged! ☕</div>
    <div id="error-toast" class="toast error"></div>
    
    <!-- Offline Banner -->
    <div id="offline-banner" class="offline-banner hidden">
        📡 You're offline - brews won't be saved
    </div>
    
    <!-- Pull-to-Refresh Indicator -->
    <div id="refresh-indicator" class="refresh-indicator hidden">
        <div class="refresh-spinner">↻</div>
    </div>
    
    <!-- Celebration Animation -->
    <div id="celebration" class="celebration hidden">🔥</div>
    
    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h3>⚠️ Brew Already Logged</h3>
            <p id="modal-message"></p>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="modal-cancel">Cancel</button>
                <button type="button" class="btn-primary" id="modal-confirm">Replace</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (using CDN) -->
    <script type="module" src="script.js"></script>
</body>
</html>
